<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Aufzug Lern-App</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#F8F8F6;--surface:#FFFFFF;--border:#E0DED8;--border2:#C8C6C0;
    --primary:#3C3489;--primary-light:#EEEDFE;--primary-mid:#534AB7;
    --text:#1A1A18;--muted:#6B6966;
    --green:#27500A;--green-bg:#EAF3DE;--green-border:#97C459;
    --red:#791F1F;--red-bg:#FCEBEB;--red-border:#F09595;
    --orange:#633806;--orange-bg:#FAEEDA;
    --radius:12px;--radius-sm:8px;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px}
  #app{max-width:600px;margin:0 auto;padding:16px}

  /* ── Header ── */
  .hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
  .hdr-title{font-size:20px;font-weight:600;color:var(--text)}
  .hdr-sub{font-size:12px;color:var(--muted);margin-top:2px}
  .stats-row{display:flex;gap:8px}
  .stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--muted)}
  .stat-pill span{font-weight:600;color:var(--text)}

  /* ── Buttons ── */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;width:auto}
  .btn:active{transform:scale(0.98)}
  .btn-primary{background:var(--primary);border-color:var(--primary);color:#EEEDFE}
  .btn-primary:hover{background:var(--primary-mid)}
  .btn-block{width:100%;padding:14px}
  .btn-sm{padding:8px 16px;font-size:13px}
  .btn-danger{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}

  /* ── Cards ── */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px}
  .card-title{font-size:14px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}

  /* ── Filter Chips ── */
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:13px;color:var(--muted);cursor:pointer;transition:all .15s;font-family:inherit}
  .chip.on{background:var(--primary);border-color:var(--primary);color:#EEEDFE;font-weight:500}
  .chip:active{transform:scale(0.97)}

  /* ── Einpräge-Liste ── */
  .learn-list{list-style:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
  .learn-item{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border);gap:12px}
  .learn-item:last-child{border-bottom:none}
  .learn-num{font-size:13px;color:var(--muted);min-width:24px;font-weight:500}
  .learn-street{font-size:16px;font-weight:500;color:var(--text)}
  .learn-nr{font-size:13px;color:var(--muted);margin-top:2px}

  /* ── Timer ── */
  .timer-bar-wrap{height:4px;background:var(--border);border-radius:2px;margin-bottom:16px;overflow:hidden}
  .timer-bar{height:100%;background:var(--primary);border-radius:2px;transition:width 1s linear}

  /* ── Test Inputs ── */
  .test-item{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .test-num{font-size:13px;color:var(--muted);min-width:24px;text-align:right}
  .test-input{flex:1;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:inherit;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s}
  .test-input:focus{border-color:var(--primary)}
  .test-input.correct{border-color:var(--green-border);background:var(--green-bg);color:var(--green)}
  .test-input.wrong{border-color:var(--red-border);background:var(--red-bg);color:var(--red)}

  /* ── Fortschritt ── */
  .prog-wrap{height:4px;background:var(--border);border-radius:2px;margin-bottom:16px;overflow:hidden}
  .prog-bar{height:100%;background:var(--primary);border-radius:2px;transition:width .3s}

  /* ── Ergebnis ── */
  .result-score{text-align:center;padding:24px 0 16px}
  .score-big{font-size:56px;font-weight:700;line-height:1}
  .score-sub{font-size:14px;color:var(--muted);margin-top:8px}
  .result-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:var(--radius-sm);margin-bottom:6px;font-size:14px}
  .result-item.ok{background:var(--green-bg);color:var(--green)}
  .result-item.nok{background:var(--red-bg);color:var(--red)}
  .result-icon{font-size:16px;flex-shrink:0}

  /* ── Bericht ── */
  .report-box{background:#1A1A18;color:#C8FFB0;border-radius:var(--radius-sm);padding:16px;font-family:monospace;font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-all;margin-bottom:12px;max-height:260px;overflow-y:auto}

  /* ── Nav-Row ── */
  .nav-row{display:flex;align-items:center;gap:10px;margin-top:16px;flex-wrap:wrap}
  .nav-row .counter{font-size:13px;color:var(--muted);flex:1;text-align:center}

  /* ── Spinbox ── */
  .spin-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .spin-row label{font-size:14px;color:var(--text);flex:1}
  .spin-wrap{display:flex;align-items:center;gap:0;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:var(--surface)}
  .spin-btn{width:36px;height:36px;border:none;background:var(--bg);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .spin-val{width:44px;text-align:center;font-size:15px;font-weight:600;border:none;outline:none;background:var(--surface);color:var(--text);font-family:inherit}

  /* ── Mobile friendly ── */
  @media(max-width:480px){
    #app{padding:12px}
    .learn-street{font-size:15px}
    .score-big{font-size:44px}
  }

  /* ── Screens ── */
  .screen{display:none}
  .screen.active{display:block}
  .fade-in{animation:fadeIn .2s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app">

  <!-- ══ START ══ -->
  <div id="screen-start" class="screen active fade-in">
    <div class="hdr">
      <div>
        <div class="hdr-title">🏢 Aufzug Lernen</div>
        <div class="hdr-sub" id="start-sub">Adressen auswendig lernen</div>
      </div>
      <div class="stats-row">
        <div class="stat-pill">✓ <span id="total-right">0</span></div>
        <div class="stat-pill">✗ <span id="total-wrong">0</span></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Wartungsintervall</div>
      <div class="chips" id="month-chips"></div>
      <div style="font-size:13px;color:var(--muted)" id="filter-count"></div>
    </div>

    <div class="card">
      <div class="card-title">Einstellungen</div>
      <div class="spin-row">
        <label>Adressen pro Runde</label>
        <div class="spin-wrap">
          <button class="spin-btn" onclick="changeN(-1)">−</button>
          <input class="spin-val" id="spin-n" value="5" readonly>
          <button class="spin-btn" onclick="changeN(+1)">+</button>
        </div>
      </div>
      <div class="spin-row">
        <label>Einprägezeit (0 = unbegrenzt)</label>
        <div class="spin-wrap">
          <button class="spin-btn" onclick="changeT(-5)">−</button>
          <input class="spin-val" id="spin-t" value="0" readonly>
          <button class="spin-btn" onclick="changeT(+5)">+</button>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-block" onclick="startRound()" id="btn-start">Runde starten →</button>

    <div style="margin-top:16px;text-align:center">
      <button class="btn btn-sm" onclick="showScreen('screen-report')">📊 Lernbericht</button>
    </div>
  </div>

  <!-- ══ EINPRÄGEN ══ -->
  <div id="screen-learn" class="screen fade-in">
    <div class="hdr">
      <div>
        <div class="hdr-title" id="learn-title">Einprägen</div>
        <div class="hdr-sub">Dann werden sie ausgeblendet</div>
      </div>
      <div id="timer-display" style="font-size:22px;font-weight:700;color:var(--primary)"></div>
    </div>
    <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar" style="width:100%"></div></div>
    <ul class="learn-list" id="learn-list"></ul>
    <div class="nav-row" style="margin-top:16px">
      <button class="btn" onclick="showScreen('screen-start')">← Zurück</button>
      <button class="btn btn-primary" onclick="goToTest()">Ich hab's! → Test</button>
    </div>
  </div>

  <!-- ══ TEST ══ -->
  <div id="screen-test" class="screen fade-in">
    <div class="hdr">
      <div>
        <div class="hdr-title">Jetzt aufschreiben</div>
        <div class="hdr-sub" id="test-sub">Straße + Hausnummer eingeben</div>
      </div>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
    <div id="test-inputs"></div>
    <div class="nav-row">
      <button class="btn btn-primary btn-block" onclick="checkAnswers()">✓ Auswerten</button>
    </div>
  </div>

  <!-- ══ ERGEBNIS ══ -->
  <div id="screen-result" class="screen fade-in">
    <div class="hdr">
      <div class="hdr-title">Ergebnis</div>
    </div>
    <div class="result-score">
      <div class="score-big" id="score-pct">—</div>
      <div class="score-sub" id="score-sub"></div>
    </div>
    <div id="result-list" style="margin-bottom:16px"></div>
    <div class="nav-row">
      <button class="btn btn-primary" onclick="retrySession()">↺ Nochmal gleiche</button>
      <button class="btn" onclick="startRound()">→ Neue Runde</button>
      <button class="btn" onclick="showScreen('screen-start')">⌂ Menü</button>
    </div>
  </div>

  <!-- ══ BERICHT ══ -->
  <div id="screen-report" class="screen fade-in">
    <div class="hdr">
      <div class="hdr-title">📊 Lernbericht</div>
    </div>
    <div class="report-box" id="report-text"></div>
    <div class="nav-row">
      <button class="btn btn-primary" onclick="copyReport()">📋 Kopieren</button>
      <button class="btn" onclick="showScreen('screen-start')">← Zurück</button>
      <button class="btn btn-danger btn-sm" onclick="clearStats()">Statistik löschen</button>
    </div>
  </div>

</div>

// ══ STATS (localStorage) ═══════════════════════════════════════════════════
function loadStats(){
  try { return JSON.parse(localStorage.getItem('lernStats')||'{"sessions":[],"totalRight":0,"totalWrong":0}'); }
  catch(e){ return {sessions:[],totalRight:0,totalWrong:0}; }
}
function saveStats(st){ localStorage.setItem('lernStats', JSON.stringify(st)); }

function updateStatDisplay(){
  const st = loadStats();
  document.getElementById('total-right').textContent = st.totalRight;
  document.getElementById('total-wrong').textContent = st.totalWrong;
}

// ══ FILTER ═════════════════════════════════════════════════════════════════
function buildChips(){
  const wrap = document.getElementById('month-chips');
  wrap.innerHTML = '';
  const months = [
    {key:'M1',label:'1 Monat'},
    {key:'M2',label:'2 Monate'},
    {key:'M3',label:'3 Monate ★'},
    {key:'M4',label:'4 Monate'},
    {key:'M6',label:'6 Monate'},
    {key:'M12',label:'12 Monate'},
    {key:'ALL',label:'Alle'},
  ];
  months.forEach(m => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (activeMonths.has(m.key) ? ' on' : '');
    chip.textContent = m.label;
    chip.onclick = () => toggleMonth(m.key);
    wrap.appendChild(chip);
  });
  updateFilterCount();
}

function toggleMonth(key){
  if(key === 'ALL'){
    if(activeMonths.has('ALL')){
      activeMonths = new Set(['M3']);
    } else {
      activeMonths = new Set(['ALL','M1','M2','M3','M4','M6','M12']);
    }
  } else {
    activeMonths.delete('ALL');
    if(activeMonths.has(key)) activeMonths.delete(key);
    else activeMonths.add(key);
    if(activeMonths.size === 0) activeMonths.add('M3');
  }
  buildChips();
}

function getFiltered(){
  let pool = [];
  const keys = activeMonths.has('ALL') ? Object.keys(DATA) :
    [...activeMonths].filter(k => DATA[k]);
  keys.forEach(k => { if(DATA[k]) pool = pool.concat(DATA[k].map(d=>({...d,_m:k}))); });
  return pool;
}

function updateFilterCount(){
  const n = getFiltered().length;
  document.getElementById('filter-count').textContent = `${n} Adressen verfügbar`;
}

// ══ SPIN ═══════════════════════════════════════════════════════════════════
function changeN(d){
  const pool = getFiltered().length;
  roundN = Math.max(2, Math.min(pool, roundN + d));
  document.getElementById('spin-n').value = roundN;
}
function changeT(d){
  roundT = Math.max(0, Math.min(300, roundT + d));
  document.getElementById('spin-t').value = roundT === 0 ? '∞' : roundT + 's';
}

// ══ SCREENS ════════════════════════════════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ══ RUNDE STARTEN ══════════════════════════════════════════════════════════
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a; }

function startRound(){
  const pool = getFiltered();
  if(!pool.length){ alert('Keine Adressen für diesen Filter.'); return; }
  roundN = parseInt(document.getElementById('spin-n').value) || 5;
  session = shuffle([...pool]).slice(0, Math.min(roundN, pool.length));

  // Liste aufbauen
  const ul = document.getElementById('learn-list');
  ul.innerHTML = '';
  session.forEach((card, i) => {
    const li = document.createElement('li');
    li.className = 'learn-item';
    li.innerHTML = `<span class="learn-num">${i+1}.</span>
      <div><div class="learn-street">${card.s}</div>
      <div class="learn-nr">Nr. ${card.n} · ${card.c}</div></div>`;
    ul.appendChild(li);
  });

  document.getElementById('learn-title').textContent = `Einprägen — ${session.length} Adressen`;
  startTime = new Date();

  // Timer
  clearInterval(timerInterval);
  const rawT = parseInt(document.getElementById('spin-t').value) || 0;
  timerLeft = isNaN(rawT) ? 0 : rawT;
  const bar = document.getElementById('timer-bar');
  const disp = document.getElementById('timer-display');

  if(timerLeft > 0){
    const total = timerLeft;
    bar.style.width = '100%';
    bar.style.background = 'var(--primary)';
    disp.textContent = timerLeft + 's';
    timerInterval = setInterval(()=>{
      timerLeft--;
      bar.style.width = Math.round(timerLeft/total*100)+'%';
      if(timerLeft <= 10) bar.style.background = '#E24B4A';
      disp.textContent = timerLeft + 's';
      if(timerLeft <= 0){ clearInterval(timerInterval); disp.textContent = '⏱ Zeit!'; setTimeout(goToTest, 800); }
    }, 1000);
  } else {
    bar.style.width = '0%';
    disp.textContent = '';
  }

  showScreen('screen-learn');
}

function retrySession(){
  startTime = new Date();
  showScreen('screen-learn');
}

// ══ TEST ═══════════════════════════════════════════════════════════════════
function goToTest(){
  clearInterval(timerInterval);
  document.getElementById('test-sub').textContent = `${session.length} Adressen — Straße + Nr.`;
  const wrap = document.getElementById('test-inputs');
  wrap.innerHTML = '';
  session.forEach((_, i) => {
    const div = document.createElement('div');
    div.className = 'test-item';
    div.innerHTML = `<span class="test-num">${i+1}.</span>
      <input class="test-input" id="ti-${i}" placeholder="Straße Nr. eingeben…" autocomplete="off" autocorrect="off" spellcheck="false">`;
    wrap.appendChild(div);
  });
  document.getElementById('prog-bar').style.width = '0%';
  // Fortschrittsbalken
  wrap.querySelectorAll('.test-input').forEach(inp => {
    inp.addEventListener('input', ()=>{
      const filled = [...wrap.querySelectorAll('.test-input')].filter(x=>x.value.trim()).length;
      document.getElementById('prog-bar').style.width = Math.round(filled/session.length*100)+'%';
    });
  });
  showScreen('screen-test');
  setTimeout(()=>{ const f=document.getElementById('ti-0'); if(f) f.focus(); },300);
}

// ══ AUSWERTEN ══════════════════════════════════════════════════════════════
function norm(s){
  return s.trim().toLowerCase()
    .replace(/[.\-\/]/g,'')
    .replace(/\s+/g,' ')
    .replace(/str\b/g,'str')
    .trim();
}

function checkAnswers(){
  const answers = session.map((_,i)=>{
    const el = document.getElementById('ti-'+i);
    return el ? el.value.trim() : '';
  });

  // Für jede Antwort: passt sie zu einer Karte?
  const matched = new Set();
  const answerResult = answers.map((ans, ai) => {
    if(!ans) return false;
    const normAns = norm(ans);
    for(let ci=0; ci<session.length; ci++){
      if(matched.has(ci)) continue;
      const card = session[ci];
      // Treffer: Straße stimmt (mit oder ohne Nr.)
      const streetOnly = norm(card.s);
      const streetNr = norm(card.s + ' ' + card.n);
      if(normAns === streetOnly || normAns === streetNr ||
         normAns.startsWith(streetOnly) || streetNr.startsWith(normAns)){
        matched.add(ci);
        return {ci, card};
      }
    }
    return false;
  });

  const right = answerResult.filter(Boolean).length;
  const total = session.length;
  const pct = Math.round(right/total*100);
  const duration = startTime ? Math.round((new Date()-startTime)/1000) : 0;

  // Inputs einfärben
  answerResult.forEach((res, ai) => {
    const el = document.getElementById('ti-'+ai);
    if(!el) return;
    if(answers[ai] === '') return;
    el.className = 'test-input ' + (res ? 'correct' : 'wrong');
  });

  // Score anzeigen
  const scoreEl = document.getElementById('score-pct');
  scoreEl.textContent = pct + '%';
  scoreEl.style.color = pct===100 ? 'var(--green)' : pct>=60 ? 'var(--orange)' : 'var(--red)';
  document.getElementById('score-sub').textContent =
    `${right} von ${total} richtig · ${Math.floor(duration/60)}m ${duration%60}s`;

  // Detail-Liste
  const rl = document.getElementById('result-list');
  rl.innerHTML = '';
  session.forEach((card, ci) => {
    const ok = matched.has(ci);
    const div = document.createElement('div');
    div.className = 'result-item ' + (ok ? 'ok' : 'nok');
    div.innerHTML = `<span class="result-icon">${ok?'✓':'✗'}</span>
      <span><strong>${card.s} ${card.n}</strong> · ${card.c}</span>`;
    rl.appendChild(div);
  });

  // Statistik speichern
  const st = loadStats();
  st.totalRight += right;
  st.totalWrong += (total - right);
  st.sessions.push({
    date: new Date().toLocaleString('de-DE'),
    months: [...activeMonths].join(','),
    total, right, pct, duration
  });
  if(st.sessions.length > 100) st.sessions = st.sessions.slice(-100);
  saveStats(st);
  updateStatDisplay();

  showScreen('screen-result');
}

// ══ BERICHT ════════════════════════════════════════════════════════════════
function buildReport(){
  const st = loadStats();
  if(!st.sessions.length){
    return 'Noch keine Lerneinheiten gespeichert.';
  }
  const last = st.sessions.slice(-20);
  let txt = `LERNBERICHT — Aufzug Lern-App\n`;
  txt += `Erstellt: ${new Date().toLocaleString('de-DE')}\n`;
  txt += `${'═'.repeat(40)}\n\n`;
  txt += `GESAMT\n`;
  txt += `  Richtig:  ${st.totalRight}\n`;
  txt += `  Falsch:   ${st.totalWrong}\n`;
  const total = st.totalRight + st.totalWrong;
  txt += `  Quote:    ${total ? Math.round(st.totalRight/total*100) : 0}%\n`;
  txt += `  Runden:   ${st.sessions.length}\n\n`;
  txt += `LETZTE 20 RUNDEN\n${'─'.repeat(40)}\n`;
  last.reverse().forEach(s => {
    txt += `${s.date}\n`;
    txt += `  Filter: ${s.months}  |  ${s.right}/${s.total} (${s.pct}%)  |  ${Math.floor(s.duration/60)}m${s.duration%60}s\n`;
  });
  return txt;
}

function showReport(){
  document.getElementById('report-text').textContent = buildReport();
  showScreen('screen-report');
}

function copyReport(){
  const txt = document.getElementById('report-text').textContent;
  navigator.clipboard.writeText(txt).then(()=>alert('Bericht kopiert!')).catch(()=>{
    document.getElementById('report-text').select();
  });
}

function clearStats(){
  if(confirm('Gesamte Lernstatistik löschen?')){
    localStorage.removeItem('lernStats');
    updateStatDisplay();
    document.getElementById('report-text').textContent = 'Statistik gelöscht.';
  }
}

// Bericht-Link überschreiben
document.querySelector('[onclick="showScreen(\'screen-report\')"]').onclick = showReport;

// ══ INIT ═══════════════════════════════════════════════════════════════════
buildChips();
updateStatDisplay();
changeT(0); // spin-t initialisieren
</script>
